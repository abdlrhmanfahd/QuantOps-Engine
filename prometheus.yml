global:
  scrape_interval: 5s

rule_files:
  - 'alerts.yml'

alerting:
  alertmanagers:
    - static_configs:
        # التصحيح هنا: استخدام الاسم البرمجي للحاوية
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['10.0.1.194:9100']

  - job_name: 'quant_bot'
    static_configs:
      - targets: ['10.0.1.194:8000']
